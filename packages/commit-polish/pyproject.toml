[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "commit-polish"
version = "0.1.0"
description = "AI-powered git commit message rewriter using local LLMs via LiteLLM"
requires-python = ">=3.11"
dependencies = [
    "litellm>=1.0.0",
    "tomlkit>=0.12.0",
    "typer>=0.9.0",
    "rich>=13.0.0",
]

[project.scripts]
commit-polish = "commit_polish.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/commit_polish"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
src = ["src"]
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]
